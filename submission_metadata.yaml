# Redrob Hackathon — Submission Metadata Template
#
# Copy this file to your repo root as `submission_metadata.yaml` and fill it in.
# The fields here should match what you submit via the portal at upload time.
# Stage 3 review uses this file to verify your portal metadata.

# ============================================================================
# Team identity
# ============================================================================
team_name: "Lucifer"  # Used in leaderboard and announcements

primary_contact:
  name: "Udumala Akhil"
  email: "akhiludumala9898@gmail.com"   # Used for all organizer communication
  phone: "+91-9515607724"        # Used for top-50 / top-10 outreach

team_members:
  - name: "Udumala Akhil"
    email: "akhiludumala9898@gmail.com"
    role: "Solo Developer"          # Optional, e.g. "Team Lead", "Backend", "Data"
  # Add more members as needed; solo participants list just one member

# ============================================================================
# Code and reproducibility
# ============================================================================
github_repo: "https://github.com/Akhil-Udumala/SemRank"
# Required. Must be reachable. Private repos OK if you can grant organizer
# access at Stage 3 (the email to add will be communicated then).

sandbox_link: "https://huggingface.co/spaces/UdumalaAkhil/redrob-ranker"
# Required. A working hosted environment where the ranker can be run on a small
# candidate sample. See Section 10.5 of submission_spec.md for acceptable
# platforms (HuggingFace Spaces, Streamlit Cloud, Replit, Colab, Docker, Binder).

reproduce_command: "python rank.py --candidates ./data/candidates.jsonl --features ./artifacts/candidate_features.parquet --out ./team_id.csv"
# The single command that produces submission.csv from candidates.jsonl.
# Should run end-to-end within 5 minutes on CPU with 16GB RAM and no network.

# ============================================================================
# Compute environment
# ============================================================================
compute:
  platform: "MacBook Air M4"                       # Adjusted to match your hardware layout
  cpu_cores: 8                                  # Number of CPU cores used
  ram_gb: 16                                    # Available RAM in GB
  python_version: "3.11.4"                      # your local python environment version
  os: "macOS Sequoia 15.7.7"                              # Or "Ubuntu 22.04 LTS", etc.
  uses_gpu_for_inference: false                 # Must be false — see compute constraints
  has_network_during_ranking: false             # Must be false — no API calls during ranking
  pre_computation_required: true                # Set to true because you pre-computed features using Gemini
  pre_computation_time_minutes: 25              # Approximate tracking evaluation loop time

# ============================================================================
# AI tools declaration
# ============================================================================
# Transparency only — declared use is NOT penalized. Be honest. Stage 5 interview
# may verify these declarations against your code; declarations that contradict
# your code or your interview are flagged.
ai_tools_used:
  - "Gemini"        # For processing raw data features
  - "Codex"         # For inline code generation and logic development
  - "Other"         # For architectural advisory and debugging

ai_usage_summary: |
  Used Gemini for pre-computing batch candidate feature metrics from large text structures. 
  Utilized Codex for inline code generation, logic assistance, and developing modular Python components. 
  Interactive assistant windows were used for end-to-end architecture advisory, asynchronous rate-limit 
  handling, and repository structure tracking.

# ============================================================================
# Approach summary (optional but recommended)
# ============================================================================
methodology_summary: |
  A hybrid modular ranking pipeline utilizing pre-computed semantic evaluation data backed by a 
  fully isolated deterministic mathematical local grading matrix. The system maps extraction 
  attributes into distinct modular processing segments (scoring, defenses, reasoning, and ranking). 
  It implements robust input defenses against prompt and context contamination layout strings, 
  and handles missing extraction matrices gracefully using static fallback algorithmic weights.

# ============================================================================
# Declarations
# ============================================================================
declarations:
  read_submission_spec: true        # I have read submission_spec.md in full
  code_is_original_work: true       # My code is my team's original work (using AI as a tool is fine)
  no_collusion: true                # I have not coordinated my submission with other teams
  honeypot_check_done: true         # Set to true since defenses.py actively checks for alignment strings
  reproduction_tested: true         # I have tested that my reproduce_command runs end-to-end